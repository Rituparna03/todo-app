<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern To-Do</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
}

.container {
    width: 90%;
    max-width: 420px;
    padding: 25px;
    border-radius: 20px;
    backdrop-filter: blur(15px);
    background: rgba(255, 255, 255, 0.1);
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
    color: white;
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

.input-box {
    display: flex;
    gap: 10px;
}

.input-box input {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 10px;
    outline: none;
}

.input-box button {
    padding: 12px;
    border: none;
    background: #00c6ff;
    color: white;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

.input-box button:hover {
    background: #0072ff;
}

ul {
    list-style: none;
    margin-top: 20px;
}

li {
    background: rgba(255,255,255,0.2);
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: 0.3s;
}

li:hover {
    transform: scale(1.02);
}

.task-text {
    flex: 1;
    cursor: pointer;
}

.completed {
    text-decoration: line-through;
    opacity: 0.6;
}

.actions {
    display: flex;
    gap: 5px;
}

button {
    cursor: pointer;
}

.edit {
    background: orange;
    border: none;
    padding: 5px 8px;
    border-radius: 5px;
}

.delete {
    background: red;
    border: none;
    padding: 5px 8px;
    border-radius: 5px;
}

</style>
</head>

<body>

<div class="container">
    <h2>✨ My To-Do List</h2>

    <div class="input-box">
        <input type="text" id="taskInput" placeholder="Enter task...">
        <button onclick="addTask()">Add</button>
    </div>

    <ul id="taskList"></ul>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

function renderTasks() {
    const list = document.getElementById("taskList");
    list.innerHTML = "";

    tasks.forEach((task, index) => {
        const li = document.createElement("li");

        li.innerHTML = `
            <span class="task-text ${task.done ? 'completed' : ''}" onclick="toggleTask(${index})">
                ${task.text}
            </span>
            <div class="actions">
                <button class="edit" onclick="editTask(${index})">✏️</button>
                <button class="delete" onclick="deleteTask(${index})">❌</button>
            </div>
        `;

        list.appendChild(li);
    });

    localStorage.setItem("tasks", JSON.stringify(tasks));
}

function addTask() {
    const input = document.getElementById("taskInput");
    if (input.value.trim() === "") return;

    tasks.push({ text: input.value, done: false });
    input.value = "";
    renderTasks();
}

function toggleTask(index) {
    tasks[index].done = !tasks[index].done;
    renderTasks();
}

function deleteTask(index) {
    tasks.splice(index, 1);
    renderTasks();
}

function editTask(index) {
    const newTask = prompt("Edit task:", tasks[index].text);
    if (newTask !== null) {
        tasks[index].text = newTask;
        renderTasks();
    }
}

renderTasks();
</script>

</body>
</html>
